name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPECTED_VERSION: "2.9.10"
  PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

jobs:
  test:
    name: Release gate / Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Syntax compile
        run: |
          python -m py_compile service.py default.py
          python -m compileall -q resources tools tests

      - name: Documentation, version, layout, and i18n checks
        run: |
          python tools/render_docs.py --check
          python tools/sync_version.py --check --expected-version "$EXPECTED_VERSION"
          python tools/test_layout.py --check
          python tools/i18n_extract.py --check

      - name: GitHub readiness tests
        run: |
          python -m pytest -q tests/test_github_readiness_g5_tooling_config.py tests/test_github_readiness_g6_ci_hardening.py tests/test_github_readiness_g7_safe_format_cleanup.py tests/test_github_readiness_g8_final_packaging.py

      - name: v2.9.10 targeted tests
        run: |
          python -m pytest -q tests/test_v2910_final_release.py
          python -m pytest -q tests/test_v2910*.py

      - name: Full pytest suite
        run: |
          python -m pytest -q

      - name: Unittest discovery
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -q

      - name: Coverage gate
        run: |
          python -m coverage run -m pytest -q
          python -m coverage report -m

      - name: Release audit
        run: |
          python tools/audit_release.py --expected-version "$EXPECTED_VERSION"

      - name: Runtime package audit
        run: |
          OUT_DIR="$RUNNER_TEMP/dist" BUILD_SUFFIX="ci" bash scripts/package_release.sh
          python - <<'PY'
          from pathlib import Path
          import zipfile

          dist = Path(__import__("os").environ["RUNNER_TEMP"]) / "dist"
          runtime_zip = dist / "script.oppo203.iso.external-2.9.10-ci.zip"
          forbidden_prefixes = (
              "script.oppo203.iso.external/tests/",
              "script.oppo203.iso.external/tools/",
              "script.oppo203.iso.external/scripts/",
              "script.oppo203.iso.external/docs/",
              "script.oppo203.iso.external/release-evidence/",
              "script.oppo203.iso.external/.github/",
          )
          with zipfile.ZipFile(runtime_zip) as zf:
              names = zf.namelist()
              bad = [name for name in names if name.startswith(forbidden_prefixes)]
              zf.testzip()
          if bad:
              raise SystemExit("Forbidden runtime ZIP members: " + ", ".join(bad[:20]))
          print(f"runtime_zip={runtime_zip.name}; files={len(names)}; forbidden=0")
          PY

      - name: Dev-source unpack smoke gate
        run: |
          OUT_DIR="$RUNNER_TEMP/dist" BUILD_SUFFIX="ci" bash scripts/package_release.sh
          mkdir -p "$RUNNER_TEMP/post-unpack"
          unzip -q "$RUNNER_TEMP/dist/script.oppo203.iso.external-2.9.10-ci-dev-source.zip" -d "$RUNNER_TEMP/post-unpack"
          cd "$RUNNER_TEMP/post-unpack/script.oppo203.iso.external"
          python tools/sync_version.py --check --expected-version "$EXPECTED_VERSION"
          python -m pytest -q tests/test_github_readiness_g5_tooling_config.py tests/test_github_readiness_g6_ci_hardening.py tests/test_github_readiness_g7_safe_format_cleanup.py tests/test_github_readiness_g8_final_packaging.py tests/test_v2910_final_release.py
          python tools/audit_release.py --expected-version "$EXPECTED_VERSION"

  lint:
    name: Lint and format checks / Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff check
        run: |
          ruff check resources default.py service.py

      - name: Black check
        run: |
          black --check resources default.py service.py


  compatibility-smoke:
    name: Compatibility smoke / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Syntax and targeted compatibility checks
        run: |
          python -m py_compile service.py default.py
          python tools/sync_version.py --check --expected-version "$EXPECTED_VERSION"
          python -m pytest -q tests/test_v2910_final_release.py tests/test_github_readiness_g5_tooling_config.py tests/test_github_readiness_g6_ci_hardening.py tests/test_github_readiness_g7_safe_format_cleanup.py tests/test_github_readiness_g8_final_packaging.py
