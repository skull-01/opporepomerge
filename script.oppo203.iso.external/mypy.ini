[mypy]
python_version = 3.9
strict = True
follow_imports = silent
ignore_missing_imports = True
warn_unused_configs = True
namespace_packages = True
explicit_package_bases = True
show_error_codes = True
pretty = True

# ENH-#51: mypy --strict is being rolled out across resources/lib incrementally.
# Only the modules listed below are gate-enforced (tools/type_check.py --gate);
# every other module is followed silently (follow_imports = silent) until a later
# batch annotates it. Add modules here leaf-first as they reach zero strict errors.
files =
    resources/lib/avr/avr_sequence.py,
    resources/lib/kodi/keymap_skin.py,
    resources/lib/oppo/autoscript_helper.py,
    resources/lib/oppo/reconnect_backoff.py,
    resources/lib/tv/adb_control.py,
    resources/lib/tv/roku_ecp_control.py,
    resources/lib/tv/smartthings_control.py
