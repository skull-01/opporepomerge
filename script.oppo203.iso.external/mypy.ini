    resources/lib/avr/avr_sequence.py,
    resources/lib/avr/avr_sony_audio.py,
    resources/lib/avr/avr_types.py,
    resources/lib/avr/avr_yamaha.py,
    resources/lib/kodi/arch_benchmark.py,
    resources/lib/kodi/diagnostic_logging.py,
    resources/lib/kodi/diagnostic_summary.py,
    resources/lib/kodi/diagnostics.py,
