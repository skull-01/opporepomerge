[mypy]
python_version = 3.9
strict = True
follow_imports = silent
ignore_missing_imports = True
warn_unused_configs = True
namespace_packages = True
explicit_package_bases = True
show_error_codes = True
pretty = True

# ENH-#51: mypy --strict is being rolled out across resources/lib incrementally.
# Only the modules listed below are gate-enforced (tools/type_check.py --gate);
# every other module is followed silently (follow_imports = silent) until a later
# batch annotates it. Add modules here leaf-first as they reach zero strict errors.
files =
    resources/lib/__init__.py,
    resources/lib/avr/avr_control.py,
    resources/lib/avr/avr_denon_marantz.py,
    resources/lib/avr/avr_diagnostics.py,
